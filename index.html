<title>锐锢 AI 智能体平台方案</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e4e4ef;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-box {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 48px 40px;
    width: 400px;
    max-width: 90vw;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    text-align: center;
  }
  .login-box h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .login-box p {
    color: #8888a4;
    margin-bottom: 32px;
    font-size: 0.9rem;
  }
  .input-group {
    position: relative;
    margin-bottom: 20px;
  }
  .input-group input {
    width: 100%;
    padding: 14px 16px;
    background: #0a0a0f;
    border: 1px solid #2d2d44;
    border-radius: 10px;
    color: #e4e4ef;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: #6366f1;
  }
  .input-group input::placeholder {
    color: #555;
  }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    color: #ef4444;
    margin-top: 16px;
    font-size: 0.85rem;
    display: none;
  }
  .loading {
    display: none;
    margin-top: 16px;
    color: #8888a4;
    font-size: 0.85rem;
  }
</style>
</head>

    </div>
    <button type="submit" id="btn">进 入</button>
  </form>

</div>

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

async function decrypt(password) {
  const salt = b64ToArrayBuffer(ENCRYPTED.salt);
  const iv = b64ToArrayBuffer(ENCRYPTED.iv);
  const ciphertext = b64ToArrayBuffer(ENCRYPTED.ciphertext);

  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: ENCRYPTED.iterations, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: iv }, key, ciphertext
  );
  return new TextDecoder().decode(decrypted);
}

async function handleSubmit(e) {
  e.preventDefault();
  const pwd = document.getElementById("pwd").value;
  const btn = document.getElementById("btn");
  const error = document.getElementById("error");
  const loading = document.getElementById("loading");

  if (!pwd) return false;

  btn.disabled = true;
  error.style.display = "none";
  loading.style.display = "block";

  try {
    const html = await decrypt(pwd);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    error.style.display = "block";
    loading.style.display = "none";
    btn.disabled = false;
  }
  return false;
}

document.getElementById("pwd").addEventListener("keydown", function(e) {
  if (e.key === "Enter") handleSubmit(e);
});
</script>
